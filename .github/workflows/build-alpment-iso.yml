name: Alpment OS 1 ISO Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - name: Bağımlılıkları ve Depoyu Klonla
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm git archiso

    - name: Proje Dosyalarını Çek
      uses: actions/checkout@v4

    - name: Alpment OS ISO Derleme İşlemini Başlat
      run: |
        mkdir -p /tmp/archiso-workspace
        cp -r archiso /tmp/archiso-workspace/alpment_profile
        cd /tmp/archiso-workspace
        mkarchiso -v -w work_dir -o out_dir alpment_profile

    - name: Derlenen ISO Dosyasını GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Alpment-OS-1-ISO
        path: /tmp/archiso-workspace/out_dir/*.iso
        if-no-files-found: error
        retention-days: 7
