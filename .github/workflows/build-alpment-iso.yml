name: Alpment OS 1 ISO Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - name: Proje Dosyalarını Çek
      uses: actions/checkout@v4

    - name: Sistemi Güncelle, Keyring Başlat ve Gerekli Araçları Kur
      run: |
        # pacman keyring initialization (özellikle temiz container ortamları için gerekli)
        pacman-key --init
        pacman-key --populate archlinux

        # güncelleme ve paket kurulum
        pacman -Syyu --noconfirm
        pacman -S --needed --noconfirm git archiso grub libisoburn mtools squashfs-tools syslinux python-pyqt6

    - name: Resmi Archiso Profilini Al ve Enjekte Et
      run: |
        mkdir -p /tmp/archiso-workspace
        cp -r /usr/share/archiso/configs/releng /tmp/archiso-workspace/alpment_profile

        if [ -d "archiso" ]; then
          cp -r archiso/* /tmp/archiso-workspace/alpment_profile/
        fi

    - name: Alpment OS ISO Derleme İşlemini Başlat
      run: |
        cd /tmp/archiso-workspace
        mkarchiso -v -w work_dir -o out_dir alpment_profile

    - name: Derlenen ISO Dosyasını GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Alpment-OS-1-ISO
        path: /tmp/archiso-workspace/out_dir/*.iso
        if-no-files-found: error
        retention-days: 7
