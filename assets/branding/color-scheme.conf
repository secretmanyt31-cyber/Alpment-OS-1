# =====================================================================
# Alpment OS 1 - Windows 12 Fan Edition Renk Paleti ve Tema Yapılandırması
# =====================================================================

[General]
Name=Alpment-Windows12-Edition
Author=Alpment OS Developer

[Background]
# Ana pencere arka planları (Koyu Akrilik Gri - Gece Modu)
Color=30,34,42
# Yan menüler ve ikincil arka planlar (Daha koyu derinlik için)
AlternateColor=24,28,36

[Foreground]
# Ana yazı rengi (Net okunabilir saf beyaz)
Color=255,255,255
# İkincil pasif yazılar (Hafif soluk gri)
MutedColor=160,168,180

[Accent]
# Vurgu Rengi (Sistem butonları ve aktif elementler için parlayan Windows Mavisi)
Color=0,198,255
# Seçim alanı ve odaklanma rengi (Neon Turkuaz)
FocusColor=0,242,254

[Effects]
# Windows 12 Akrilik / Cam (Blur) Efekti Ayarları
BlurRadius=30
Opacity=0.82
GlassEnabled=true

[WindowHeader]
# Pencere başlık çubukları rengi (Yarı şeffaf koyu mod)
ActiveBackground=30,34,42
ActiveForeground=255,255,255
InactiveBackground=24,28,36
InactiveForeground=120,120,120
