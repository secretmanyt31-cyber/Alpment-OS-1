# =====================================================================
# Alpment OS 1 - Gelişmiş Dosya Yöneticisi (Dolphin) Yapılandırması
# =====================================================================

[InterfaceSettings]
# Windows 12 tarzı modern yan menü ve ağaç görünümü yerleşimi
ViewMode=Details
PreviewsShown=true
ShowHiddenFiles=false
SidebarIconSize=24
MainIconSize=48

[Navigation]
# Klasörlere tek tık yerine Windows'taki gibi çift tıkla girmesini sağlar
SingleClickToActivate=false
OpenInTabs=true
RememberOpenedTabs=true

[Performance]
# Sistem performansını uçuran ve kasmayı engelleyen önbellek ayarları
PreloadDirectoryContents=true
MaxThumbnailFileSize=52428800
LowMemoryMode=false

[GlassThemeEnforcement]
# assets/branding/color-scheme.conf ile tam uyumlu cam efektleri
BlurBehindSidebar=true
OpacityValue=0.85
CustomPalette=Alpment-Windows12-Edition

[PlacesSidebar]
# Sol taraftaki hızlı erişim menüsünde nelerin görüneceği
ShowHome=true
ShowDesktop=true
ShowDownloads=true
ShowDocuments=true
ShowPictures=true
ShowRoot=false
ShowTrash=true
