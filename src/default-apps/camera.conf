# =====================================================================
# Alpment OS 1 - Varsayılan Kamera (Kamoso) Yapılandırma Dosyası
# =====================================================================

[General]
# Varsayılan kayıt klasörü (Kullanıcının Resimler ve Videolar klasörüne gider)
ScreenshotDirectory[$e]=$HOME/Pictures
VideoDirectory[$e]=$HOME/Videos

[Device]
# İlk bulunan aktif web kamerasını otomatik seç (Hata payını sıfırlar)
DefaultDevice=0
# Donanımsal hızlandırma ve akıcı FPS ayarı (Kamera donmasını engeller)
ForceHardwareAcceleration=true

[View]
# Açılışta varsayılan önizleme çözünürlüğü (Uyumlu ve dengeli)
DefaultWidth=1280
DefaultHeight=720
# Ekran tazeleme modu (Gecikmesiz akıcı görüntü için)
Framerate=30

[Format]
# Video ve fotoğraf kayıt formatları (Her yerde açılabilen kaliteli kodaklar)
ImageFormat=png
VideoFormat=mp4
VideoCodec=h264
