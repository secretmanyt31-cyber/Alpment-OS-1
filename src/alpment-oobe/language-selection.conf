# =====================================================================
# Alpment OS 1 - OOBE Dil Seçim Ekranı Yapılandırması
# =====================================================================

[General]
# Varsayılan dil (Sistem ilk açıldığında Türkçe olarak başlayacak)
DefaultLanguage=tr_TR.UTF-8
AvailableLanguages=tr_TR,en_US,de_DE,fr_FR,es_ES

[Interface]
# Dil seçim ekranının Windows 12 tarzı modern görünüm ayarları
Theme=Alpment-Glass-OOBE
Layout=Grid
IconSize=64
ShowFlagIcons=true

[Fonts]
# Modern ve temiz yazı tipi ayarı
FontFamily=Segoe UI, Arial, sans-serif
FontSize=12

[Translations]
# Dil seçim ekranındaki başlıkların dillere göre karşılıkları
Title.tr=Alpment OS 1'e Hoş Geldiniz
Title.en=Welcome to Alpment OS 1
Title.de=Willkommen bei Alpment OS 1

Subtitle.tr=Lütfen bir dil seçerek kuruluma devam edin.
Subtitle.en=Please select a language to continue setup.
Subtitle.de=Bitte wählen Sie eine Sprache, um fortzufahren.

Button.tr=İlerle
Button.en=Next
Button.de=Weiter
